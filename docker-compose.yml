###Orquesta todos los contenedores del proyecto (Levanta tu API, Qdrant y 
###la base de datos SQL con un solo comando).
version: '3.8'
services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "127.0.0.1:6333:6333" # Solo accesible desde el propio servidor, no desde la tailnet
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: ${postgres_username}
      POSTGRES_PASSWORD: ${postgres_password}
      POSTGRES_DB: ${postgres_database}
    ports:
      - "127.0.0.1:5433:5432" # Solo accesible desde el propio servidor, no desde la tailnet
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
  api:
    build: ./Backend
    container_name: api
    env_file:
      - ./Backend/.env
    environment:
      - APP_ENV=docker # Define el entorno de la aplicacion como "docker"
      # - POSTGRES_USER=${postgres_username}
      # - POSTGRES_PASSWORD=${postgres_password}
      # - POSTGRES_DB=${postgres_database}
      # - POSTGRES_HOST=postgres
      # - POSTGRES_PORT=5432
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    expose:
      - "8000" # Solo visible dentro de la red de docker-compose; nginx lo expone a la tailnet
    depends_on:
      - qdrant
      - postgres
    restart: unless-stopped
  nginx:
    image: nginx:alpine
    container_name: nginx
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped
volumes:
  qdrant_data:
  postgres_data: